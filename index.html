<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Password Security Simulator</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f4f6f9;
      text-align: center;
      padding: 30px;
    }

    .container {
      max-width: 500px;
      margin: auto;
      background: white;
      padding: 25px;
      border-radius: 10px;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }

    h1 {
      color: #c0392b;
    }

    input {
      width: 90%;
      padding: 12px;
      margin-top: 15px;
      border: 1px solid #ccc;
      border-radius: 5px;
      font-size: 16px;
    }

    button {
      margin-top: 15px;
      padding: 10px 20px;
      border: none;
      border-radius: 5px;
      background: #2980b9;
      color: white;
      font-size: 16px;
      cursor: pointer;
    }

    #result {
      margin-top: 20px;
      font-size: 18px;
      font-weight: bold;
    }

    .weak {
      color: red;
    }

    .medium {
      color: orange;
    }

    .strong {
      color: green;
    }

    #simulation {
      margin-top: 20px;
      padding: 15px;
      background: #ecf0f1;
      border-radius: 5px;
      min-height: 50px;
    }
  </style>
</head>
<body>

<div class="container">
  <h1>Password Security Simulator</h1>

  <p>
    Educational tool to demonstrate password strength and how weak passwords are easily guessed.
  </p>

  <input type="password" id="password" placeholder="Enter a password">
  <br>
  <button onclick="checkPassword()">Check Password</button>

  <div id="result"></div>
  <div id="simulation"></div>
</div>

<script>
function checkPassword() {
  const password = document.getElementById('password').value;
  const result = document.getElementById('result');
  const simulation = document.getElementById('simulation');

  let score = 0;

  if (password.length >= 8) score++;
  if (/[A-Z]/.test(password)) score++;
  if (/[a-z]/.test(password)) score++;
  if (/[0-9]/.test(password)) score++;
  if (/[^A-Za-z0-9]/.test(password)) score++;

  if (score <= 2) {
    result.innerHTML = 'Weak Password';
    result.className = 'weak';

    simulateGuess(password, ['123456', 'password', 'admin', 'qwerty', password]);
  }
  else if (score <= 4) {
    result.innerHTML = 'Medium Strength Password';
    result.className = 'medium';

    simulateGuess(password, ['welcome1', 'admin123', 'pass2026', password]);
  }
  else {
    result.innerHTML = 'Strong Password';
    result.className = 'strong';

    simulation.innerHTML = 'Strong passwords are much harder to guess.';
  }
}

function simulateGuess(realPassword, attempts) {
  const simulation = document.getElementById('simulation');
  simulation.innerHTML = 'Starting password guess simulation...';

  let i = 0;

  const interval = setInterval(() => {
    simulation.innerHTML += `<br>Trying: ${attempts[i]}`;

    if (attempts[i] === realPassword) {
      simulation.innerHTML += '<br><strong>Password guessed!</strong>';
      clearInterval(interval);
    }

    i++;

    if (i >= attempts.length) {
      clearInterval(interval);
    }
  }, 800);
}
</script>

</body>
</html>
